protocolVersion: 2
name: superbench_uaback_auto_{uid}
type: job
jobRetryCount: 0
prerequisites:
  - type: dockerimage
    uri: {image}
    name: superbench_image
secrets:
  client_id: {client_id}
parameters:
  resource_id: 499b84ac-1321-427f-aa17-267ca6975798
taskRoles:
  taskrole:
    instances: {instances}
    completion:
      minFailedInstances: -1
      minSucceededInstances: -1
    taskRetryCount: 0
    dockerImage: superbench_image
    extraContainerOptions:
      infiniband: true
    resourcePerInstance:
      gpu: 8
      cpu: 88
      memoryMB: 819200
    commands:
      - export NODE_COUNT=1
      - export NODE_LIST=localhost
      - >-
        sed -i 's|source /tmp/sb.env|source /tmp/sb.env \&\& source
        /etc/profile|' /opt/superbench/superbench/runner/runner.py
      - pip install /opt/superbench/
      - pip uninstall ansible_core -y
      - curl -sL https://aka.ms/InstallAzureCLIDeb | bash
      - az login --identity --client-id <% $secrets.client_id %> --allow-no-subscriptions
      - >-
        git -c http.extraheader="AUTHORIZATION: Bearer $(az account get-access-token --resource <% $parameters.resource_id %> --query accessToken -o tsv)"
        clone https://LuciaTrainingPlatform@dev.azure.com/LuciaTrainingPlatform/LTP/_git/ltp-validation /opt/ltp-validation
      - cd /opt/ltp-validation
      - export DATE=$(date +%Y%m%d%H%M%S)
      - >-
        python3 script/run.py --category NCCL TensorCore IB PCIe Model
        --output-dir /output/validation/validation-$DATE
defaults:
  virtualCluster: default
extras:
  gangAllocation: false
  forceNodes: {hostnames}
  enableLocalStorage:
    enabled: true
    hostpath: /mntext
    mntpath: /output
  hivedScheduler:
    jobPriorityClass: oppo
  jobStatusChangeNotification:
    running: true
    succeeded: true
    failed: true
  submitFrom: submit-job-v2
