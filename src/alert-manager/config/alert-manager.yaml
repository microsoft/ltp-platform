service_type: "common"

port: 9093
actions-available:
- webportal-notification
- cordon-nodes
- uncordon-nodes
- reboot-nodes
- drain-nodes
- fix-nvidia-gpu-low-perf
- cert-expiration-checker

# ============================================================================
# Storage Backend Configuration
# ============================================================================
# Global storage backend setting (applies to all services unless overridden)
# Options: 'kusto' or 'postgresql'
storage-backend: kusto

# Kusto (Azure Data Explorer) Configuration
# Only required if using Kusto backend (storage-backend: kusto)
kusto:
  kusto-cluster: ""  # e.g., https://your-cluster.kusto.windows.net
  kusto-database: ""  # e.g., YourDatabase
  kusto-user-assigned-client-id: ""  # For managed identity authentication
  node-status-table: NodeStatusRecord
  node-action-table: NodeActionRecord
  kusto-vm-table: ""  # VM info table name

# PostgreSQL Configuration
# Only required if using PostgreSQL backend (storage-backend: postgresql)
postgresql:
  schema: ltp_sdk  # Default schema name

# ============================================================================
# Service Configuration
# ============================================================================
alert-handler:
  log-level: 'info'
  port: 9095
  configured: False
alert-parser:
  configured: False
cluster-utilization:
  configured: False
job-data-recorder:
  configured: False
job-status-change-notification:
  # Max connection number to database in poller.
  configured: False
  log-level: 'info'
  db-poller-max-db-connection: 10
  db-poller-interval-second: 600
node-issue-classifier:
  configured: False
node-recycler:
  configured: False
  icm:
    host: prod.microsofticm.com
    crt_name: cert.pem
    crt_path: /icm/cert.pem
    key_name: key.pem
    key_path: /icm/key.pem
    connector_id: ""
    routing_id: hpclucia://AzureHPC/Lucia/TrainingPlatform
  vmss:
    client_id: ""
    vmss_ids: ""
    validation_image: bench.azurecr.io/superbench:0.11-rocm6.3
use-pylon: False
repeat-interval: '24h'
cert-expiration-checker:
  schedule: '0 0 * * *'
  alert-residual-days: 10
  alert_group_email: ''
node-failure-detection:
  redis:
    enabled: False
  monitor:
    configured: False
  detector:
    configured: False


