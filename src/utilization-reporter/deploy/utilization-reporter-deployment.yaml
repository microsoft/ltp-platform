apiVersion: apps/v1
kind: Deployment
metadata:
  name: utilization-reporter-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: utilization-reporter
  template:
    metadata:
      name: utilization-reporter
      labels:
        app: utilization-reporter
    spec:
      hostNetwork: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: pai-master
                operator: In
                values:
                - "true"
      containers:
      - name: prometheus
        image: luciaopenai.azurecr.io/luciaopenai/utilization-reporter:latest
        resources:
          limits:
            cpu: "2"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        command: ["python3", "cluster_utilization_reporter.py"]
        env:
        - name: PAI_BEARER_TOKEN
          value: "{{PAI_BEARER_TOKEN}}"
        - name: PAI_URI
          value: "https://we.openpai.org/"
        ports:
        - name: http
          containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: utilization-reporter-service
spec:
  selector:
    app: utilization-reporter
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: ClusterIP
