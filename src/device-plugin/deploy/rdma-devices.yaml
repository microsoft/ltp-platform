apiVersion: v1
kind: ConfigMap
metadata:
  name: rdma-devices
  namespace: kube-system
data:
  config.json: |
    {
        "periodicUpdateInterval": 300,
        "configList": [{
             "resourceName": "hca",
             "rdmaHcaMax": 1000,
             "selectors": {
                "linkTypes": ["infiniband"]
              }
           }
        ]
    }
