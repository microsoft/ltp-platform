protocolVersion: 2
name: hello-world-job
type: job
jobRetryCount: 0
prerequisites:
  - type: dockerimage
    uri: 'nvcr.io/nvidia/pytorch:24.03-py3'
    name: docker_image0
taskRoles:
  taskrole: # the name of the task role, defined by the user
    instances: 1 # the number of node to run the task role
    completion:
      minFailedInstances: 1  # the job will fail if any 1 instances failed
      minSucceededInstances: -1 # the job will succeed if all instances succeeded
    taskRetryCount: 0
    dockerImage: docker_image0 # the docker image name defined in prerequisites
    extraContainerOptions:
      infiniband: true
    resourcePerInstance:
      gpu: 8 # the resource requirement of each node, it can be less than total GPUs in one node. For example, if you can set it to 1, then divide the total CPU and memory by the total number of GPUs
      cpu: 88
      memoryMB: 819200
    commands:
        - echo "prepare network and topology..."
        - mkdir -p /opt/microsoft
        - >-
            wget
            https://raw.githubusercontent.com/Azure/azhpc-images/master/topology/ndv4-topo.xml
            -O /opt/microsoft/ndv4-topo.xml
        - export NCCL_IB_PCI_RELAXED_ORDERING=1
        - export NCCL_SOCKET_IFNAME=eth0
        - export CUDA_DEVICE_ORDER=PCI_BUS_ID
        - export NCCL_NET_GDR_LEVEL=5
        - export NCCL_TOPO_FILE=/opt/microsoft/ndv4-topo.xml
        - export NCCL_DEBUG=WARN
        - echo "Exam environment variables..."
        - 'echo "node_rank:"$PAI_CURRENT_TASK_ROLE_CURRENT_TASK_INDEX'
        - 'echo "master_addr:"$PAI_HOST_IP_taskrole_0'
        - 'echo "master_port:"$PAI_PORT_LIST_taskrole_0_http'
        - export GPU_PER_NODE_COUNT=8
        - export AZUREML_NODE_COUNT=$PAI_TASK_ROLE_TASK_COUNT_taskrole
        - export NODE_RANK=$PAI_CURRENT_TASK_ROLE_CURRENT_TASK_INDEX
        - export MASTER_ADDR=$PAI_HOST_IP_taskrole_0
        - export MASTER_PORT=$PAI_PORT_LIST_taskrole_0_http
        - >-
            export NUM_PROCESS=$((GPU_PER_NODE_COUNT *
            PAI_TASK_ROLE_TASK_COUNT_taskrole))
        - 'echo "gpu count:"$GPU_PER_NODE_COUNT'
        - 'echo "node count:"$PAI_TASK_ROLE_TASK_COUNT_taskrole'
        - 'echo "num process:"$NUM_PROCESS'
        - nvidia-smi
defaults:
    virtualCluster: test # the virtual cluster to run the job
extras:
    hivedScheduler:
        taskRoles:
            taskrole:
                skuNum: 8
                skuType: A100
    com.microsoft.pai.runtimeplugin:
        - plugin: ssh
          parameters:
            sshbarrier: true # the barrier will be used to synchronize the setup of the job such as image pull on all nodes before the job starts
            jobssh: false
